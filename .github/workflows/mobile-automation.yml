name: Mobile Automation (Cloud Emulator)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    # CRITICAL: Must be macOS. Linux runners do not support the hardware 
    # acceleration (KVM) required to boot an Android emulator.
    runs-on: macos-13 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Start Appium Server
        run: npx appium &

      - name: Run Tests in Cloud Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31          # Android 12
          target: google_apis
          arch: x86_64
          profile: pixel_6       # Standard device profile
          disable-animations: true # Speeds up test execution
          # This script runs automatically once the emulator is fully booted
          script: npx playwright test
        env:
          DEVICE_0_UDID: 'emulator-5554'
          DEVICE_0_SYSTEM_PORT: '8200'