name: Mobile Automation (Cloud Emulator)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest # The only reliable host for free Android emulators

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests in Cloud Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31          
          target: google_apis
          arch: x86_64        
          profile: pixel_6       
          disable-animations: true 
          script: npx playwright test