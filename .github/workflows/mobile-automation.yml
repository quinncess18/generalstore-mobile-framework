name: Mobile Automation (Cloud Emulator)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest # Apple Silicon (M1) - Fast queue, no Linux

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests in Cloud Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33          
          target: google_apis
          # CRITICAL: ARM architecture runs natively on M1 Macs. No virtualization required.
          arch: arm64-v8a        
          profile: pixel_6       
          disable-animations: true 
          script: npx playwright test